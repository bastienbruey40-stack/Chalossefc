<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Effectif - FC Chalosse</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            padding: 20px; 
            text-align: center; 
            margin: 0;
        }
        .container { 
            max-width: 600px; 
            margin: auto; 
            padding-bottom: 30px; 
        }
        
        h1 { 
            background: #1a1a1a; 
            color: #ffcc00; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid #1a1a1a; 
            margin-top: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        .card { 
            background: #fffce6; 
            border: 2px solid #1a1a1a; 
            padding: 15px 20px; 
            margin: 10px 0; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex; 
            align-items: center; 
            text-align: left; 
        }
        
        .logo-joueur {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            border: 2px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            margin-right: 15px;
        }

        .joueur-info strong { font-size: 1.1em; color: #1a1a1a; }
        .joueur-info span { color: #444; font-size: 0.9em; font-weight: bold; }
        
        .btn-retour { 
            display: inline-block; 
            margin-top: 20px; 
            background: #1a1a1a; 
            color: #ffcc00; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            border: 2px solid #1a1a1a; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👕 Effectif du Club</h1>
        
        <div id="liste-tous-joueurs">
            <p>Chargement de l'effectif...</p>
        </div>
        
        <a href="index.html" class="btn-retour">🔙 Retour à l'accueil</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function chargerTousLesJoueurs() {
            const conteneur = document.getElementById('liste-tous-joueurs');
            try {
                const querySnapshot = await getDocs(collection(db, "utilisateurs"));
                let html = "";
                let listeJoueurs = [];

                querySnapshot.forEach((doc) => {
                    let data = doc.data();
                    if (data.role === "joueur") {
                        listeJoueurs.push(data);
                    }
                });

                // Tri par ordre alphabétique sur le nom de famille
                listeJoueurs.sort((a, b) => a.nom.localeCompare(b.nom));

                listeJoueurs.forEach(data => {
                    html += `
                        <div class="card">
                            <div class="logo-joueur">👤</div>
                            <div class="joueur-info">
                                <strong>${data.prenom} ${data.nom.toUpperCase()}</strong><br>
                                <span>${data.poste || "Poste non renseigné"}</span>
                            </div>
                        </div>
                    `;
                });

                conteneur.innerHTML = html || "<p>Aucun joueur trouvé dans la base.</p>";
            } catch (error) {
                console.error("Erreur:", error);
                conteneur.innerHTML = "<p style='color:red;'>Erreur lors du chargement.</p>";
            }
        }

        chargerTousLesJoueurs();
    </script>
</body>
</html>
