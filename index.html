<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Chalosse - Notation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; margin: 10px 0; border-radius: 12px; 
                box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; 
               border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: bold; }
        h1 { color: #1a1a1a; }
        .poste { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚽ FC Chalosse</h1>
        <p>Sélectionnez un joueur pour le noter</p>
        
        <div id="liste-joueurs">
            <p>Chargement des joueurs...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20",
            measurementId: "G-CDJC1RMEHQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function chargerJoueurs() {
            const querySnapshot = await getDocs(collection(db, "utilisateurs"));
            const conteneur = document.getElementById('liste-joueurs');
            conteneur.innerHTML = ''; 

            querySnapshot.forEach((doc) => {
                const joueur = doc.data();
                if(joueur.role === "joueur") {
                    conteneur.innerHTML += `
                        <div class="card">
                            <div style="text-align: left;">
                                <strong>${joueur.prenom} ${joueur.nom}</strong><br>
                                <span class="poste">${joueur.poste}</span>
                            </div>
                            <a href="noter.html?id=${doc.id}" class="btn">Noter</a>
                        </div>
                    `;
                }
            });
        }

        chargerJoueurs();
    </script>
</body>
</html>
