<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FC Chalosse - Accueil</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FC Chalosse">
    
    <link rel="apple-touch-icon" href="chalosse.webp">
    <link rel="icon" href="chalosse.webp">
    <link rel="manifest" href="manifest.json">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; padding-bottom: 90px; text-align: center; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        
        h1 { display: flex; align-items: center; justify-content: center; gap: 12px; background-color: #1a1a1a; color: #ffcc00; padding: 15px; border-radius: 12px; border: 2px solid #1a1a1a; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 10px; margin-bottom: 30px; font-size: 1.6em; }
        .logo-header { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: white; border: 2px solid #ffcc00; }

        #info-connexion { position: fixed; bottom: 0; left: 0; width: 100%; background: #fffce6; padding: 15px 0; font-size: 0.85em; border-top: 3px solid #1a1a1a; z-index: 1000; }
        
        .btn-jaune { display: inline-block; background: #ffc107; color: black; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin: 5px; font-size: 0.9em; border: 2px solid #1a1a1a; }
        .btn-vert { display: none; background: #28a745; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin: 5px; font-size: 0.9em; border: 2px solid #1a1a1a; }
        .btn-deconnexion { background: #dc3545; color: white; border: 2px solid #1a1a1a; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8em; margin-left: 15px; }

        .titre-section { text-align: left; font-weight: bold; font-size: 1.1em; border-bottom: 3px solid; padding-bottom: 5px; margin-top: 25px; margin-bottom: 15px; }
        .titre-premiere { color: #1a1a1a; border-color: #1a1a1a; }
        .titre-reserve { color: #b38f00; border-color: #ffcc00; }
        
        .match-list { display: flex; flex-direction: column; gap: 12px; }
        
        .match-container { position: relative; margin-bottom: 5px; } 
        
        .match-row { background: #fffce6; border: 2px solid #1a1a1a; border-radius: 12px; padding: 15px; cursor: pointer; text-decoration: none; color: inherit; display: block; transition: transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .match-row:active { transform: scale(0.98); background: #ffea00; }
        
        .match-content { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; align-items: center; gap: 10px; flex: 1; }
        .team.right { justify-content: flex-end; text-align: right; }
        .team-name { font-weight: bold; font-size: 0.95em; color: #1a1a1a; }
        
        .logo { width: 40px; height: 40px; object-fit: contain; border-radius: 50%; background: white; border: 2px solid #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .match-date { text-align: center; font-size: 0.8em; color: #1a1a1a; font-weight: bold; margin-top: 8px; }
        
        /* Styles pour l'affichage du score */
        .score-box { background: #ffcc00; color: #1a1a1a; font-weight: bold; font-size: 1.3em; padding: 5px 12px; border-radius: 8px; border: 2px solid #1a1a1a; min-width: 45px; text-align: center; }
        .vs-box { font-weight: bold; color: #1a1a1a; font-size: 1em; }

        /* Boutons d'édition sur les matchs */
        .btn-supprimer-match { position: absolute; top: -8px; right: -8px; background: #dc3545; color: white; border: 2px solid #1a1a1a; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1em; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .btn-score-match { position: absolute; top: -8px; left: -8px; background: #17a2b8; color: white; border: 2px solid #1a1a1a; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1em; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
    </style>
</head>
<body>

    <div class="container">
        <h1><img src="chalosse.webp" alt="Logo FC Chalosse" class="logo-header"> FC Chalosse</h1>
        
        <!-- Navigation Principale -->
        <div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center;">
            <a href="effectif.html" class="btn-jaune">👕 Effectif</a>
            <a href="stats.html" class="btn-jaune" style="background: #e2e3e5; color: black;">📊 Stats Saison</a>
            
            <a href="ajouter.html" id="btn-admin" class="btn-vert">➕ Joueur</a>
            <a href="ajouter_match.html" id="btn-admin-match" class="btn-vert">➕ Match</a>
            <a href="gerer_compo.html" id="btn-admin-compo" class="btn-vert" style="background: #17a2b8;">📋 Compos</a>
            <a href="saisir_stats.html" id="btn-admin-stats" class="btn-vert" style="background: #6f42c1;">📝 Saisir Stats</a>
            <a href="gerer_comptes.html" id="btn-admin-comptes" class="btn-vert" style="background: #dc3545;">⚙️ Comptes</a>
        </div>

        <div class="titre-section titre-premiere">🔵 Équipe Première</div>
        <div id="matchs-premiere" class="match-list"><p style="color:gray;">Chargement des matchs...</p></div>

        <div class="titre-section titre-reserve">🟢 Équipe Réserve</div>
        <div id="matchs-reserve" class="match-list"><p style="color:gray;">Chargement des matchs...</p></div>
    </div>

    <div id="info-connexion">Vérification de la connexion...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // Ajout de updateDoc ici
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let estAdmin = false;

        onAuthStateChanged(auth, async (user) => {
            const infoDiv = document.getElementById('info-connexion');
            if (user) {
                infoDiv.innerHTML = `Connecté : <b>${user.email}</b> <button id="btn-deconnecter" class="btn-deconnexion">Quitter</button>`;
                document.getElementById('btn-deconnecter').addEventListener('click', () => { signOut(auth).then(() => { window.location.href = "connexion.html"; }); });

                const docSnap = await getDoc(doc(db, "utilisateurs", user.uid));
                if (docSnap.exists() && docSnap.data().role === "admin") {
                    estAdmin = true;
                    document.getElementById('btn-admin').style.display = 'inline-block';
                    document.getElementById('btn-admin-match').style.display = 'inline-block';
                    document.getElementById('btn-admin-compo').style.display = 'inline-block';
                    document.getElementById('btn-admin-stats').style.display = 'inline-block';
                    document.getElementById('btn-admin-comptes').style.display = 'inline-block';
                }
                chargerMatchs(); 
            } else {
                window.location.href = "connexion.html";
            }
        });

        async function chargerMatchs() {
            const querySnapshot = await getDocs(collection(db, "matchs"));
            let htmlPremiere = "";
            let htmlReserve = "";

            querySnapshot.forEach((doc) => {
                let data = doc.data();
                let logoAdversaire = data.logo ? `<img src="${data.logo}" class="logo">` : `<div class="logo">🛡️</div>`;
                
                // --- GESTION DE L'AFFICHAGE DU SCORE ---
                // Si un score existe, on l'affiche dans un beau rectangle jaune. Sinon, juste "VS"
                let affichageCentre = `<div class="vs-box">VS</div>`;
                if (data.score_chalosse !== undefined && data.score_chalosse !== null) {
                    affichageCentre = `<div class="score-box">${data.score_chalosse} - ${data.score_adversaire}</div>`;
                }

                // Boutons Admin
                let btnSupprimer = estAdmin ? `<button class="btn-supprimer-match" onclick="event.preventDefault(); supprimerMatch('${doc.id}', '${data.adversaire}')" title="Supprimer">🗑️</button>` : "";
                let btnScore = estAdmin ? `<button class="btn-score-match" onclick="event.preventDefault(); modifierScore('${doc.id}', '${data.adversaire}', '${data.score_chalosse}', '${data.score_adversaire}')" title="Éditer le score">✏️</button>` : "";

                let matchHtml = `
                    <div class="match-container">
                        ${btnScore}
                        <a href="match_detail.html?match=${doc.id}" class="match-row">
                            <div class="match-content">
                                <div class="team">
                                    <img src="chalosse.webp" class="logo" alt="Logo Chalosse">
                                    <span class="team-name">FC Chalosse</span>
                                </div>
                                ${affichageCentre}
                                <div class="team right">
                                    <span class="team-name">${data.adversaire || "Adversaire"}</span>
                                    ${logoAdversaire}
                                </div>
                            </div>
                            <div class="match-date">📅 ${data.date || "Date inconnue"}</div>
                        </a>
                        ${btnSupprimer}
                    </div>
                `;

                if (data.equipe_type === "premiere") htmlPremiere += matchHtml;
                else htmlReserve += matchHtml;
            });

            document.getElementById('matchs-premiere').innerHTML = htmlPremiere || "<p>Aucun match prévu.</p>";
            document.getElementById('matchs-reserve').innerHTML = htmlReserve || "<p>Aucun match prévu.</p>";
        }

        window.supprimerMatch = async function(matchId, adversaire) {
            if (confirm(`⚠️ Voulez-vous vraiment supprimer définitivement le match contre ${adversaire} ?`)) {
                try {
                    await deleteDoc(doc(db, "matchs", matchId));
                    chargerMatchs();
                } catch (error) { alert("Erreur : " + error.message); }
            }
        };

        // --- NOUVELLE FONCTION POUR AJOUTER/MODIFIER LE SCORE ---
        window.modifierScore = async function(matchId, adversaire, scoreC, scoreA) {
            // Nettoyage des valeurs si elles n'existent pas encore
            let valC = (scoreC !== "undefined" && scoreC !== "null") ? scoreC : "";
            let valA = (scoreA !== "undefined" && scoreA !== "null") ? scoreA : "";

            let saisieChalosse = prompt(`Score de FC Chalosse :\n(Laissez vide pour effacer le score du match)`, valC);
            if (saisieChalosse === null) return; // Si on clique sur "Annuler"

            // Si on laisse vide, ça efface les scores du match (pratique en cas d'erreur ou de report)
            if (saisieChalosse.trim() === "") {
                try {
                    await updateDoc(doc(db, "matchs", matchId), { score_chalosse: null, score_adversaire: null });
                    chargerMatchs();
                } catch(e) { alert("Erreur : " + e.message); }
                return;
            }

            let saisieAdversaire = prompt(`Score de ${adversaire} :`, valA);
            if (saisieAdversaire === null) return; // Si on clique sur "Annuler"

            try {
                // On enregistre les scores sous format nombre (parseInt)
                await updateDoc(doc(db, "matchs", matchId), {
                    score_chalosse: parseInt(saisieChalosse) || 0,
                    score_adversaire: parseInt(saisieAdversaire) || 0
                });
                chargerMatchs(); // Rafraîchit l'affichage en direct
            } catch(e) {
                alert("Erreur lors de l'enregistrement : " + e.message);
            }
        };
    </script>
</body>
</html>
