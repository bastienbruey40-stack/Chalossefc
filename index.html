<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FC Chalosse - Accueil</title>

    <!-- CONFIGURATION MODE APPLI (PWA) AVEC TON LOGO -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FC Chalosse">
    
    <!-- Icône de l'appli sur le téléphone -->
    <link rel="apple-touch-icon" href="chalosse.webp">
    <link rel="icon" href="chalosse.webp">

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            padding: 20px; 
            padding-bottom: 90px; 
            text-align: center; 
            margin: 0;
        }
        .container { max-width: 600px; margin: auto; }
        
        /* En-tête Jaune et Noir */
        h1 { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            background-color: #1a1a1a; 
            color: #ffcc00; 
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 10px;
            margin-bottom: 30px;
            font-size: 1.6em;
        }
        
        /* Logo dans le header */
        .logo-header {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            border: 2px solid #ffcc00;
        }

        #info-connexion { position: fixed; bottom: 0; left: 0; width: 100%; background: #fffce6; padding: 15px 0; font-size: 0.85em; border-top: 3px solid #1a1a1a; z-index: 1000; }
        
        .btn-jaune { display: inline-block; background: #ffc107; color: black; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin: 5px; font-size: 0.9em; border: 2px solid #1a1a1a; }
        .btn-vert { display: none; background: #28a745; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin: 5px; font-size: 0.9em; border: 2px solid #1a1a1a; }
        .btn-deconnexion { background: #dc3545; color: white; border: 2px solid #1a1a1a; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8em; margin-left: 15px; }

        .titre-section { text-align: left; font-weight: bold; font-size: 1.1em; border-bottom: 3px solid; padding-bottom: 5px; margin-top: 25px; margin-bottom: 15px; }
        .titre-premiere { color: #1a1a1a; border-color: #1a1a1a; }
        .titre-reserve { color: #b38f00; border-color: #ffcc00; }
        
        .match-list { display: flex; flex-direction: column; gap: 12px; }
        .match-row { background: #fffce6; border: 2px solid #1a1a1a; border-radius: 12px; padding: 15px; cursor: pointer; text-decoration: none; color: inherit; display: block; transition: transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .match-row:active { transform: scale(0.98); background: #ffea00; }
        
        .match-content { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; align-items: center; gap: 10px; flex: 1; }
        .team.right { justify-content: flex-end; text-align: right; }
        .team-name { font-weight: bold; font-size: 0.95em; color: #1a1a1a; }
        
        /* Logos dans la liste des matchs */
        .logo { width: 40px; height: 40px; object-fit: contain; border-radius: 50%; background: white; border: 2px solid #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .match-date { text-align: center; font-size: 0.8em; color: #1a1a1a; font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- LE LOGO EST INTEGRE ICI DANS LE TITRE -->
        <h1><img src="chalosse.webp" alt="Logo FC Chalosse" class="logo-header"> FC Chalosse</h1>
        
        <!-- Navigation Principale -->
        <div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center;">
            <a href="effectif.html" class="btn-jaune">👕 Effectif</a>
            <a href="stats.html" class="btn-jaune" style="background: #e2e3e5; color: black;">📊 Stats Saison</a>
            
            <a href="ajouter.html" id="btn-admin" class="btn-vert">➕ Joueur</a>
            <a href="ajouter_match.html" id="btn-admin-match" class="btn-vert">➕ Match</a>
            <a href="gerer_compo.html" id="btn-admin-compo" class="btn-vert" style="background: #17a2b8;">📋 Compos</a>
            <a href="saisir_stats.html" id="btn-admin-stats" class="btn-vert" style="background: #6f42c1;">📝 Saisir Stats</a>
        </div>

        <div class="titre-section titre-premiere">🔵 Équipe Première</div>
        <div id="matchs-premiere" class="match-list"><p style="color:gray;">Chargement des matchs...</p></div>

        <div class="titre-section titre-reserve">🟢 Équipe Réserve</div>
        <div id="matchs-reserve" class="match-list"><p style="color:gray;">Chargement des matchs...</p></div>
    </div>

    <div id="info-connexion">Vérification de la connexion...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // REMETTRE TA CONFIG ICI
        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            const infoDiv = document.getElementById('info-connexion');
            if (user) {
                infoDiv.innerHTML = `Votant : <b>${user.email}</b> <button id="btn-deconnecter" class="btn-deconnexion">Quitter</button>`;
                document.getElementById('btn-deconnecter').addEventListener('click', () => { signOut(auth).then(() => { window.location.href = "connexion.html"; }); });

                const docSnap = await getDoc(doc(db, "utilisateurs", user.uid));
                if (docSnap.exists() && docSnap.data().role === "admin") {
                    document.getElementById('btn-admin').style.display = 'inline-block';
                    document.getElementById('btn-admin-match').style.display = 'inline-block';
                    document.getElementById('btn-admin-compo').style.display = 'inline-block';
                    document.getElementById('btn-admin-stats').style.display = 'inline-block';
                }
                chargerMatchs(); 
            } else {
                window.location.href = "connexion.html";
            }
        });

        async function chargerMatchs() {
            const querySnapshot = await getDocs(collection(db, "matchs"));
            let htmlPremiere = "";
            let htmlReserve = "";

            querySnapshot.forEach((doc) => {
                let data = doc.data();
                let logoAdversaire = data.logo ? `<img src="${data.logo}" class="logo">` : `<div class="logo">🛡️</div>`;
                
                // LE LOGO EST INTEGRE ICI DANS CHAQUE LIGNE DE MATCH
                let matchHtml = `
                    <a href="match_detail.html?match=${doc.id}" class="match-row">
                        <div class="match-content">
                            <div class="team">
                                <img src="chalosse.webp" class="logo" alt="Logo Chalosse">
                                <span class="team-name">FC Chalosse</span>
                            </div>
                            <div style="font-weight:bold; color:#1a1a1a;">VS</div>
                            <div class="team right">
                                <span class="team-name">${data.adversaire || "Adversaire"}</span>
                                ${logoAdversaire}
                            </div>
                        </div>
                        <div class="match-date">📅 Match du ${data.date || "Date inconnue"}</div>
                    </a>
                `;

                if (data.equipe_type === "premiere") htmlPremiere += matchHtml;
                else htmlReserve += matchHtml;
            });

            document.getElementById('matchs-premiere').innerHTML = htmlPremiere || "<p>Aucun match prévu.</p>";
            document.getElementById('matchs-reserve').innerHTML = htmlReserve || "<p>Aucun match prévu.</p>";
        }
    </script>
</body>
</html>
