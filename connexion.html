<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - FC Chalosse</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .lien-inscription { display: block; margin-top: 15px; color: #28a745; text-decoration: none; font-weight: bold; }
        
        /* Design du message d'erreur qui s'affichera au besoin */
        #msg-erreur { display: none; background: #dc3545; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 0.9em; text-align: left;}
    </style>
</head>
<body>

    <div class="card">
        <h2>🔐 Se connecter</h2>
        <p>Connecte-toi pour noter les joueurs</p>
        
        <!-- C'est ici que l'erreur s'affichera -->
        <div id="msg-erreur"></div>
        
        <label style="text-align: left; display: block; margin-top: 10px;">Adresse Email :</label>
        <input type="email" id="email" placeholder="ton.nom@email.com">
        
        <label style="text-align: left; display: block; margin-top: 10px;">Mot de passe :</label>
        <input type="password" id="password" placeholder="Ton mot de passe">
        
        <button class="btn" onclick="connecter()">Se connecter</button>
        
        <a href="inscription.html" class="lien-inscription">Pas encore de compte ? S'inscrire ici</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Si l'utilisateur est DEJA connecté, on le renvoie direct à l'accueil
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "index.html";
            }
        });

        window.connecter = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errDiv = document.getElementById('msg-erreur');
            
            // On cache l'erreur à chaque nouvelle tentative
            errDiv.style.display = "none";

            if(email === "" || password === "") {
                errDiv.innerText = "⚠️ Merci de remplir ton email et ton mot de passe.";
                errDiv.style.display = "block";
                return;
            }

            try {
                // Tentative de connexion (si ça marche, le onAuthStateChanged au dessus va s'activer et te rediriger tout seul !)
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                // Si ça plante, on affiche le message visuel sur la page et on y reste !
                errDiv.innerText = "❌ Identifiants incorrects. Vérifie ton email et ton mot de passe.";
                errDiv.style.display = "block";
            }
        }
    </script>
</body>
</html>
