<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques - FC Chalosse</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #f8f9fa; font-weight: bold; color: #333; }
        td.nom-joueur { text-align: left; font-weight: bold; }
        
        .btn-retour { display: inline-block; margin-top: 20px; background: #6c757d; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 Statistiques de la Saison</h1>

        <div class="card">
            <table id="table-stats">
                <thead>
                    <tr>
                        <th style="text-align: left;">Joueur</th>
                        <th title="Matchs Joués">MJ</th>
                        <th title="Buts">⚽</th>
                        <th title="Cartons Jaunes">🟨</th>
                        <th title="Cartons Rouges">🟥</th>
                    </tr>
                </thead>
                <tbody id="corps-table">
                    <tr><td colspan="5">Calcul des statistiques en cours...</td></tr>
                </tbody>
            </table>
        </div>

        <a href="index.html" class="btn-retour">🔙 Retour à l'accueil</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function calculerStats() {
            // 1. Récupérer tous les joueurs
            const joueursRef = await getDocs(collection(db, "utilisateurs"));
            let statsGlobales = {};

            joueursRef.forEach(doc => {
                let data = doc.data();
                if (data.role === "joueur") {
                    statsGlobales[doc.id] = {
                        nomComplet: `${data.prenom} ${data.nom}`,
                        matchsJoues: 0,
                        buts: 0,
                        jaunes: 0,
                        rouges: 0
                    };
                }
            });

            // 2. Récupérer tous les matchs pour additionner
            const matchsRef = await getDocs(collection(db, "matchs"));
            
            matchsRef.forEach(doc => {
                let matchData = doc.data();
                let compo = matchData.compo || [];
                let statsMatch = matchData.stats_joueurs || {};

                // Ajouter +1 Match Joué pour chaque joueur dans la compo
                compo.forEach(idJoueur => {
                    if (statsGlobales[idJoueur]) {
                        statsGlobales[idJoueur].matchsJoues += 1;
                    }
                });

                // Additionner les buts et les cartons
                for (let idJoueur in statsMatch) {
                    if (statsGlobales[idJoueur]) {
                        statsGlobales[idJoueur].buts += (statsMatch[idJoueur].buts || 0);
                        statsGlobales[idJoueur].jaunes += (statsMatch[idJoueur].jaunes || 0);
                        statsGlobales[idJoueur].rouges += (statsMatch[idJoueur].rouges || 0);
                    }
                }
            });

            // 3. Convertir en tableau et trier (par Buts, puis par Matchs Joués)
            let listeStats = Object.values(statsGlobales);
            listeStats.sort((a, b) => b.buts - a.buts || b.matchsJoues - a.matchsJoues);

            // 4. Afficher le tableau
            let html = "";
            listeStats.forEach(stat => {
                html += `
                    <tr>
                        <td class="nom-joueur">${stat.nomComplet}</td>
                        <td><b>${stat.matchsJoues}</b></td>
                        <td style="color: #28a745; font-weight: bold;">${stat.buts}</td>
                        <td style="color: #d39e00; font-weight: bold;">${stat.jaunes}</td>
                        <td style="color: #dc3545; font-weight: bold;">${stat.rouges}</td>
                    </tr>
                `;
            });

            document.getElementById('corps-table').innerHTML = html || "<tr><td colspan='5'>Aucune stat disponible.</td></tr>";
        }

        calculerStats();
    </script>
</body>
</html>
