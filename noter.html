<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Noter le joueur</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Noter le match</h2>
        <p id="nom-joueur">Chargement...</p>
        
        <label>Note (0 à 10) :</label>
        <input type="number" id="note" min="0" max="10" value="5">
        
        <label>Commentaire :</label>
        <textarea id="commentaire" placeholder="Ton avis sur le match..."></textarea>
        
        <button class="btn" onclick="envoyerNote()">Valider la note</button>
        <br><br>
        <a href="index.html">Retour à la liste</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeE9UX-3y3rqc3oBoUJsmKrLUgyGRPxNI",
            authDomain: "chalosse-d1ef5.firebaseapp.com",
            projectId: "chalosse-d1ef5",
            storageBucket: "chalosse-d1ef5.firebasestorage.app",
            messagingSenderId: "33787098721",
            appId: "1:33787098721:web:1c55d5f153426e1ae85c20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Récupérer l'ID du joueur dans l'URL
        const params = new URLSearchParams(window.location.search);
        const idJoueur = params.get('id');

        // Afficher le nom du joueur
        async function chargerInfos() {
            const docSnap = await getDoc(doc(db, "utilisateurs", idJoueur));
            if (docSnap.exists()) {
                document.getElementById('nom-joueur').innerText = docSnap.data().prenom + " " + docSnap.data().nom;
            }
        }
        chargerInfos();

        // Envoyer la note à Firebase
        window.envoyerNote = async function() {
            const noteVal = document.getElementById('note').value;
            const commVal = document.getElementById('commentaire').value;

            try {
                await addDoc(collection(db, "notes"), {
                    joueur_id: idJoueur,
                    note: parseInt(noteVal),
                    commentaire: commVal,
                    date: new Date()
                });
                alert("Note enregistrée !");
                window.location.href = "index.html";
            } catch (e) {
                alert("Erreur : " + e.message);
            }
        }
    </script>
</body>
</html>
